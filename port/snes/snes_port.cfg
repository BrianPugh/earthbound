# snes_port.cfg -- Linker configuration for SNES C port
#
# This is scaffolding.  The exact syntax depends on the linker:
#   - ca65/ld65: uses this format directly
#   - vbcc/vlink: uses a different config format
#   - Calypsi: uses .ld linker scripts
#
# The memory map matches the original game's snes.cfg.
# Written in ld65 format for reference.

MEMORY {
    # Work RAM (mirrors $7E0000-$7E0B7FF)
    BSS:   start = $7E0000, size = $B800, fill = no, file = "", type = rw, define = yes;

    # Extended Work RAM ($7EB800-$7EFFFF)
    RAM2:  start = $7EB800, size = $14800, fill = no, file = "", type = rw;

    # Save RAM ($300000-$301FFF, 8KB)
    SRAM:  start = $300000, size = $2000, fill = no, file = "", type = rw;

    # ROM banks ($C00000-$C2FFFF, 3MB HiROM)
    ROM:   start = $C00000, size = $300000, fill = yes, type = ro;
}

SEGMENTS {
    # C code and read-only data
    CODE:     load = ROM,                  type = ro;
    RODATA:   load = ROM,                  type = ro;

    # SNES internal header at $00FFC0 (mapped to $C0FFC0 in HiROM)
    HEADER:   load = ROM, start = $C0FFB0, type = ro;

    # Startup code (reset vector target)
    STARTUP:  load = ROM, start = $C00000, type = ro;

    # BSS (zero-initialized RAM)
    BSS:      load = BSS,                  type = bss;

    # Additional data segments for ROM-resident assets
    # These would map to the same bank layout as the original game
    # BANK00-BANK3F as needed for asset data

    # Save RAM
    SRAM:     load = SRAM,                 type = rw;
}
